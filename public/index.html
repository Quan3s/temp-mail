<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Pro Temp Mail</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">
    <div class="max-w-md mx-auto p-4">
        <div class="text-center my-8">
            <h1 class="text-3xl font-bold text-blue-400">⚡ Pro Temp Mail</h1>
            <p class="text-slate-400 text-sm">Email tạm thời cho iOS & iSH</p>
        </div>

        <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 mb-6">
            <label class="text-xs text-slate-500 uppercase font-bold">Địa chỉ của bạn</label>
            <div class="flex mt-2">
                <input id="email-addr" readonly type="text" value="Đang tạo..." 
                    class="bg-slate-900 border border-slate-700 text-blue-300 w-full p-3 rounded-l-lg outline-none text-sm">
                <button onclick="copyEmail()" class="bg-blue-600 px-4 rounded-r-lg hover:bg-blue-500">
                    <i class="fa-regular fa-copy"></i>
                </button>
            </div>
            <button onclick="createNewEmail()" class="w-full mt-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm transition">
                <i class="fa-solid fa-rotate mr-2"></i> Đổi địa chỉ mới
            </button>
        </div>

        <div class="bg-slate-800 rounded-xl border border-slate-700 overflow-hidden">
            <div class="p-4 border-b border-slate-700 flex justify-between items-center">
                <h2 class="font-bold">Hộp thư đến</h2>
                <span id="status" class="text-[10px] bg-green-500/20 text-green-400 px-2 py-1 rounded-full animate-pulse">Live</span>
            </div>
            <div id="messages" class="divide-y divide-slate-700 min-h-[300px]">
                <div class="p-8 text-center text-slate-500">
                    <i class="fa-solid fa-inbox text-4xl mb-3 block"></i>
                    Đang chờ thư đến...
                </div>
            </div>
        </div>
    </div>

    <div id="mail-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4">
        <div class="bg-slate-800 w-full max-w-lg rounded-2xl max-h-[80vh] overflow-y-auto p-6 border border-slate-600">
            <div class="flex justify-between mb-4">
                <h3 id="modal-subject" class="font-bold text-lg text-blue-400"></h3>
                <button onclick="closeModal()" class="text-slate-400"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="modal-content" class="text-slate-300 text-sm overflow-x-auto bg-white p-4 rounded text-black"></div>
        </div>
    </div>

    <script>
        const API = 'https://api.mail.tm';
        let account = null;
        let token = '';

        async function createNewEmail() {
            document.getElementById('email-addr').value = "Đang tạo...";
            try {
                const domains = await fetch(`${API}/domains`).then(r => r.json());
                const domain = domains['hydra:member'][0].domain;
                const address = `user${Math.floor(Math.random()*999999)}@${domain}`;
                const password = 'password123';

                await fetch(`${API}/accounts`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address, password })
                });

                const auth = await fetch(`${API}/token`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address, password })
                }).then(r => r.json());

                token = auth.token;
                document.getElementById('email-addr').value = address;
                fetchMessages();
            } catch (e) { alert("Lỗi khi tạo mail!"); }
        }

        async function fetchMessages() {
            if (!token) return;
            const res = await fetch(`${API}/messages`, {
                headers: { 'Authorization': `Bearer ${token}` }
            }).then(r => r.json());
            
            const container = document.getElementById('messages');
            const mails = res['hydra:member'];
            
            if (mails.length > 0) {
                container.innerHTML = mails.map(m => `
                    <div onclick="readMail('${m.id}')" class="p-4 hover:bg-slate-700/50 cursor-pointer transition">
                        <div class="text-xs text-blue-400 font-bold">${m.from.address}</div>
                        <div class="text-sm font-semibold truncate">${m.subject}</div>
                        <div class="text-[10px] text-slate-500 mt-1">${new Date(m.createdAt).toLocaleTimeString()}</div>
                    </div>
                `).join('');
            }
        }

        async function readMail(id) {
            const res = await fetch(`${API}/messages/${id}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            }).then(r => r.json());
            
            document.getElementById('modal-subject').innerText = res.subject;
            document.getElementById('modal-content').innerHTML = res.html || `<pre>${res.text}</pre>`;
            document.getElementById('mail-modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('mail-modal').classList.add('hidden'); }
        function copyEmail() {
            const input = document.getElementById('email-addr');
            input.select();
            navigator.clipboard.writeText(input.value);
            alert("Đã copy!");
        }

        setInterval(fetchMessages, 5000);
        createNewEmail();
    </script>
</body>
</html>
