<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Ultimate Temp Mail</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .active-tab { border-bottom: 3px solid #3b82f6; color: #3b82f6; background: rgba(30, 41, 59, 0.5); }
        .mail-card:hover .action-btns { opacity: 1; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen font-sans">
    <div class="max-w-xl mx-auto p-4">
        <header class="text-center py-6">
            <h1 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-500">ULTIMATE TEMP MAIL</h1>
        </header>

        <div class="flex bg-slate-900/80 rounded-t-2xl border-t border-x border-slate-800 overflow-hidden">
            <button onclick="switchTab(1)" id="tab1-btn" class="flex-1 py-4 text-sm font-bold active-tab transition-all">
                <i class="fa-solid fa-user-tag mr-2"></i> MAIL ĐƠN
            </button>
            <button onclick="switchTab(2)" id="tab2-btn" class="flex-1 py-4 text-sm font-bold text-slate-500 transition-all">
                <i class="fa-solid fa-users-gear mr-2"></i> ĐA HÒM THƯ
            </button>
        </div>

        <div class="bg-slate-900/80 p-5 rounded-b-2xl border border-slate-800 shadow-2xl mb-6">
            <div id="tab1-content">
                <div id="single-mail-area">
                    </div>
            </div>

            <div id="tab2-content" class="hidden">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[10px] font-bold text-slate-500 tracking-widest uppercase">Danh sách tối đa 5 mail</span>
                    <button onclick="addMail(true)" class="bg-blue-600 hover:bg-blue-500 text-white text-[10px] font-bold px-3 py-1 rounded-full transition">
                        + THÊM HÒM THƯ
                    </button>
                </div>
                <div id="multi-mail-list" class="space-y-3"></div>
            </div>
        </div>

        <div class="bg-slate-900/80 rounded-2xl border border-slate-800 overflow-hidden shadow-2xl">
            <div class="p-4 bg-slate-800/40 border-b border-slate-800 flex justify-between items-center">
                <div class="flex items-center space-x-2">
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-ping"></div>
                    <span id="current-label" class="text-xs font-mono text-blue-400 truncate max-w-[200px]">Chọn hòm thư...</span>
                </div>
                <button onclick="refreshInbox()" class="text-slate-500 hover:text-white transition"><i class="fa-solid fa-rotate"></i></button>
            </div>
            <div id="inbox-content" class="min-h-[350px] max-h-[500px] overflow-y-auto divide-y divide-slate-800/50">
                <div class="p-20 text-center text-slate-600">
                    <i class="fa-solid fa-envelope-open-text text-4xl mb-4 block opacity-20"></i>
                    Hộp thư đang trống
                </div>
            </div>
        </div>
    </div>

    <div id="reader-modal" class="hidden fixed inset-0 bg-black/95 z-50 flex items-center justify-center p-2 sm:p-4">
        <div class="bg-slate-900 w-full max-w-2xl rounded-3xl border border-slate-700 overflow-hidden shadow-2xl">
            <div class="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-800/50">
                <h3 id="mail-subj" class="text-sm font-bold truncate pr-6"></h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-white text-2xl">&times;</button>
            </div>
            <div id="mail-body" class="p-4 bg-white text-black h-[75vh] overflow-y-auto"></div>
        </div>
    </div>

    <script>
        const API = 'https://api.mail.tm';
        let singleMail = JSON.parse(localStorage.getItem('singleMail')) || null;
        let multiMails = JSON.parse(localStorage.getItem('multiMails')) || [];
        let activeView = null; // {address, token}

        function genUser() {
            const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
            let len = Math.floor(Math.random() * 10) + 5;
            let res = '';
            for(let i=0; i<len; i++) res += chars.charAt(Math.floor(Math.random() * chars.length));
            return res;
        }

        async function addMail(isMulti = false) {
            if(isMulti && multiMails.length >= 5) return alert("Hết chỗ rồi sếp!");
            
            try {
                const domains = await fetch(`${API}/domains`).then(r => r.json());
                const domain = domains['hydra:member'][0].domain;
                const address = `${genUser()}@${domain}`;
                const password = 'propassword123';

                await fetch(`${API}/accounts`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ address, password })
                });

                const auth = await fetch(`${API}/token`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ address, password })
                }).then(r => r.json());

                const newMail = { address, token: auth.token };

                if(isMulti) {
                    multiMails.push(newMail);
                } else {
                    singleMail = newMail;
                }
                
                saveAndRender();
                selectMail(newMail.address, newMail.token);
            } catch(e) { alert("Lỗi API 1 rồi sếp!"); }
        }

        function saveAndRender() {
            localStorage.setItem('singleMail', JSON.stringify(singleMail));
            localStorage.setItem('multiMails', JSON.stringify(multiMails));

            // Render Tab 1
            const t1 = document.getElementById('single-mail-area');
            if(singleMail) {
                t1.innerHTML = renderMailItem(singleMail, 'single');
            } else {
                t1.innerHTML = `<button onclick="addMail(false)" class="w-full py-4 border-2 border-dashed border-slate-700 rounded-xl text-slate-500 hover:border-blue-500 transition">Tạo Mail Đơn Mới</button>`;
            }

            // Render Tab 2
            const t2 = document.getElementById('multi-mail-list');
            t2.innerHTML = multiMails.map((m, i) => renderMailItem(m, 'multi', i)).join('');
        }

        function renderMailItem(m, type, index) {
            const isActive = activeView?.address === m.address ? 'border-blue-500 bg-blue-500/5' : 'border-slate-800 bg-slate-800/40';
            return `
                <div class="mail-card p-3 rounded-xl border ${isActive} transition-all flex items-center justify-between">
                    <div onclick="selectMail('${m.address}', '${m.token}')" class="flex-1 truncate cursor-pointer">
                        <div class="text-[10px] text-slate-500 font-mono">Mail.tm Address</div>
                        <div class="text-sm font-bold text-slate-200 truncate">${m.address}</div>
                    </div>
                    <div class="flex space-x-1 ml-2">
                        <button onclick="copyToClipboard('${m.address}')" class="p-2 text-blue-400 hover:bg-blue-500/10 rounded-lg transition" title="Copy">
                            <i class="fa-regular fa-copy"></i>
                        </button>
                        <button onclick="deleteMail('${type}', ${index})" class="p-2 text-red-500 hover:bg-red-500/10 rounded-lg transition" title="Xóa">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </div>
                </div>
            `;
        }

        async function selectMail(address, token) {
            activeView = { address, token };
            document.getElementById('current-label').innerText = address;
            saveAndRender();
            refreshInbox();
        }

        async function refreshInbox() {
            if(!activeView) return;
            const container = document.getElementById('inbox-content');
            try {
                const res = await fetch(`${API}/messages`, {
                    headers: {'Authorization': `Bearer ${activeView.token}`}
                }).then(r => r.json());
                
                const mails = res['hydra:member'];
                if(!mails.length) {
                    container.innerHTML = `<div class="p-20 text-center text-slate-600 text-xs italic">Đang chờ thư đến...</div>`;
                    return;
                }

                container.innerHTML = mails.map(m => `
                    <div onclick="readMail('${m.id}')" class="p-4 hover:bg-slate-800/60 cursor-pointer transition border-l-2 border-transparent hover:border-blue-500">
                        <div class="text-[10px] font-bold text-blue-400 mb-1">${m.from.address}</div>
                        <div class="text-sm font-semibold truncate text-slate-200">${m.subject || '(Không tiêu đề)'}</div>
                        <div class="text-[9px] text-slate-500 mt-2">${new Date(m.createdAt).toLocaleString()}</div>
                    </div>
                `).join('');
            } catch(e) { console.error("Inbox Error"); }
        }

        async function readMail(id) {
            const res = await fetch(`${API}/messages/${id}`, {
                headers: {'Authorization': `Bearer ${activeView.token}`}
            }).then(r => r.json());
            document.getElementById('mail-subj').innerText = res.subject;
            document.getElementById('mail-body').innerHTML = res.html || `<pre class="whitespace-pre-wrap">${res.text}</pre>`;
            document.getElementById('reader-modal').classList.remove('hidden');
        }

        function deleteMail(type, index) {
            if(type === 'single') {
                singleMail = null;
            } else {
                multiMails.splice(index, 1);
            }
            if(activeView && !singleMail && type==='single') activeView = null;
            saveAndRender();
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            const btn = event.currentTarget;
            btn.innerHTML = '<i class="fa-solid fa-check"></i>';
            setTimeout(() => btn.innerHTML = '<i class="fa-regular fa-copy"></i>', 2000);
        }

        function switchTab(t) {
            document.getElementById('tab1-content').classList.toggle('hidden', t !== 1);
            document.getElementById('tab2-content').classList.toggle('hidden', t !== 2);
            document.getElementById('tab1-btn').className = t === 1 ? 'flex-1 py-4 text-sm font-bold active-tab transition-all' : 'flex-1 py-4 text-sm font-bold text-slate-500 transition-all';
            document.getElementById('tab2-btn').className = t === 2 ? 'flex-1 py-4 text-sm font-bold active-tab transition-all' : 'flex-1 py-4 text-sm font-bold text-slate-500 transition-all';
        }

        function closeModal() { document.getElementById('reader-modal').classList.add('hidden'); }

        // Auto Refresh
        setInterval(refreshInbox, 5000);
        saveAndRender();
        
        // Mặc định chọn mail đơn nếu có sẵn
        if(singleMail) selectMail(singleMail.address, singleMail.token);
    </script>
</body>
</html>
